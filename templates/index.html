<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #07070a;
      --surface:    #0e0e12;
      --border:     #1a1a20;
      --text:       #c6c3bb;
      --muted:      #3e3c38;
      --accent:     #e8b84b;
      --accent-glow: rgba(232,184,75,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Martian Mono', monospace;
      font-size: 13px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulseAnim 2.4s ease-in-out infinite;
    }

    @keyframes pulseAnim {
      0%,100% { opacity:1; } 50% { opacity:.3; }
    }

    header h1 {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--text);
    }

    header .meta {
      margin-left: auto;
      font-size: 9px;
      letter-spacing: .1em;
      color: var(--muted);
    }

    /* ── Feed ── */
    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 40px 0 20px;
      scroll-behavior: smooth;
    }

    #feed::-webkit-scrollbar { width: 2px; }
    #feed::-webkit-scrollbar-thumb { background: var(--border); }

    .msg {
      max-width: 700px;
      margin: 0 auto 32px;
      padding: 0 28px;
      animation: rise .25s ease both;
    }

    @keyframes rise {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .msg-role {
      font-size: 8px;
      letter-spacing: .22em;
      text-transform: uppercase;
      margin-bottom: 9px;
    }

    .msg.user  .msg-role { color: var(--accent); }
    .msg.bot   .msg-role { color: var(--muted); }

    .msg-body {
      font-family: 'Lora', serif;
      font-size: 15.5px;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-body { color: #d9d6cf; }

    /* ── Sources ── */
    .sources {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* text/fallback pill tags */
    .src-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .src {
      font-size: 8px;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 3px 9px;
      border: 1px solid rgba(232,184,75,.18);
      background: rgba(232,184,75,.06);
      color: rgba(232,184,75,.65);
      border-radius: 2px;
    }

    /* media preview grid */
    .media-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .media-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .media-item img,
    .media-item video {
      display: block;
      max-width: 220px;
      max-height: 160px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: max-width .3s ease, max-height .3s ease, border-color .2s;
    }

    .media-item img:hover,
    .media-item video:hover { border-color: rgba(232,184,75,.3); }

    .media-item img.expanded {
      max-width: 640px;
      max-height: 480px;
    }

    .media-item video { cursor: default; max-width: 280px; max-height: 180px; }

    .media-label {
      font-size: 8px;
      letter-spacing: .08em;
      color: var(--muted);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* PDF link */
    .pdf-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 3px;
      text-decoration: none;
      color: var(--text);
      transition: border-color .2s;
      max-width: 320px;
    }

    .pdf-link:hover { border-color: rgba(232,184,75,.3); }

    .pdf-badge {
      font-size: 7px;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 2px 6px;
      background: rgba(232,184,75,.1);
      border: 1px solid rgba(232,184,75,.2);
      color: var(--accent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .pdf-name {
      font-size: 10px;
      letter-spacing: .04em;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Typing dots ── */
    .dots {
      display: flex;
      gap: 5px;
      padding: 6px 0;
    }

    .dots span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.1s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay:.18s; }
    .dots span:nth-child(3) { animation-delay:.36s; }

    @keyframes blink {
      0%,80%,100% { opacity:.2; } 40% { opacity:1; }
    }

    /* ── Empty state ── */
    #empty {
      max-width: 700px;
      margin: 60px auto 0;
      padding: 0 28px;
    }

    #empty p {
      font-family: 'Lora', serif;
      font-size: 14px;
      font-style: italic;
      color: var(--muted);
      line-height: 1.9;
    }

    /* ── Input bar ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 18px 28px;
      flex-shrink: 0;
    }

    .bar {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'Lora', serif;
      font-size: 15px;
      line-height: 1.65;
      padding: 11px 15px;
      resize: none;
      outline: none;
      min-height: 46px;
      max-height: 150px;
      overflow-y: auto;
      transition: border-color .2s;
    }

    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: rgba(232,184,75,.28); }

    button {
      background: var(--accent);
      color: #07070a;
      border: none;
      border-radius: 3px;
      font-family: 'Martian Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .16em;
      text-transform: uppercase;
      padding: 0 18px;
      height: 46px;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity .15s, box-shadow .15s;
    }

    button:hover { opacity:.85; box-shadow: 0 0 16px var(--accent-glow); }
    button:disabled { opacity:.25; cursor: not-allowed; box-shadow: none; }

    /* ── Image search button ── */
    #img-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0;
      width: 46px;
      transition: border-color .2s, color .2s;
    }

    #img-btn:hover { border-color: rgba(232,184,75,.3); color: var(--accent); box-shadow: none; }

    #img-btn svg { pointer-events: none; }

    /* ── Query image preview ── */
    .query-image {
      max-width: 180px;
      max-height: 130px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid var(--border);
      display: block;
    }
  </style>
</head>
<body>

<header>
  <div class="pulse"></div>
  <h1>Multimodal Knowledge Base</h1>
  <span class="meta">claude-sonnet-4-6 &nbsp;/&nbsp; pinecone</span>
</header>

<div id="feed">
  <div id="empty">
    <p>Knowledge base is live. Ask anything &mdash;<br>text, images, video, and PDFs have been indexed.</p>
  </div>
</div>

<footer>
  <div class="bar">
    <textarea id="inp" placeholder="Ask a question..." rows="1" autofocus></textarea>
    <button id="img-btn" title="Search by image" onclick="document.getElementById('img-input').click()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </button>
    <input type="file" id="img-input" accept="image/*" style="display:none" onchange="searchByImage(this)">
    <button id="btn" onclick="send()">Send</button>
  </div>
</footer>

<script>
  const feed = document.getElementById('feed');
  const inp  = document.getElementById('inp');
  const btn  = document.getElementById('btn');
  let history = [];

  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 150) + 'px';
  });

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  function renderSources(sources) {
    if (!sources.length) return '';

    const media  = sources.filter(s => s.url && ['image','video','pdf'].includes(s.type));
    const tagged = sources.filter(s => !s.url || !['image','video','pdf'].includes(s.type));

    let html = '<div class="sources">';

    if (media.length) {
      html += '<div class="media-grid">';
      for (const s of media) {
        html += '<div class="media-item">';
        if (s.type === 'image') {
          html += `<img src="${s.url}" alt="${esc(s.filename)}" loading="lazy" onclick="this.classList.toggle('expanded')">`;
        } else if (s.type === 'video') {
          html += `<video src="${s.url}" controls preload="metadata"></video>`;
        } else if (s.type === 'pdf') {
          const pg = s.page_start ? ` p.${s.page_start}–${s.page_end}` : '';
          html += `<a class="pdf-link" href="${s.url}" target="_blank"><span class="pdf-badge">PDF</span><span class="pdf-name">${esc(s.filename)}${pg}</span></a>`;
        }
        if (s.type !== 'pdf') {
          html += `<span class="media-label">${esc(s.filename)}</span>`;
        }
        html += '</div>';
      }
      html += '</div>';
    }

    if (tagged.length) {
      const tags = tagged.map(s => {
        const pg = s.page_start ? ` &middot; p.${s.page_start}&ndash;${s.page_end}` : '';
        return `<span class="src">${s.type} &middot; ${esc(s.filename)}${pg}</span>`;
      }).join('');
      html += `<div class="src-tags">${tags}</div>`;
    }

    html += '</div>';
    return html;
  }

  function addMsg(role, text, sources = []) {
    document.getElementById('empty')?.remove();

    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;

    const label = role === 'user' ? 'You' : 'Assistant';

    div.innerHTML = `
      <div class="msg-role">${label}</div>
      <div class="msg-body">${esc(text)}</div>
      ${renderSources(sources)}
    `;
    feed.appendChild(div);
    feed.scrollTop = feed.scrollHeight;
  }

  function addTyping() {
    document.getElementById('empty')?.remove();
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing';
    div.innerHTML = `<div class="msg-role">Assistant</div><div class="dots"><span></span><span></span><span></span></div>`;
    feed.appendChild(div);
    feed.scrollTop = feed.scrollHeight;
  }

  function esc(s) {
    return s
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }

  async function searchByImage(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = '';

    document.getElementById('empty')?.remove();
    btn.disabled = true;

    // Show query image in feed
    const objectUrl = URL.createObjectURL(file);
    const queryDiv = document.createElement('div');
    queryDiv.className = 'msg user';
    queryDiv.innerHTML = `
      <div class="msg-role">You — image search</div>
      <img class="query-image" src="${objectUrl}">
    `;
    feed.appendChild(queryDiv);
    addTyping();
    feed.scrollTop = feed.scrollHeight;

    const formData = new FormData();
    formData.append('image', file);

    try {
      const res = await fetch('/search-image', { method: 'POST', body: formData });
      const data = await res.json();
      document.getElementById('typing')?.remove();

      if (data.error) {
        addMsg('bot', 'Error: ' + data.error);
      } else if (!data.sources.length) {
        addMsg('bot', 'No visually similar content found in the knowledge base.');
      } else {
        const div = document.createElement('div');
        div.className = 'msg bot';
        div.innerHTML = `
          <div class="msg-role">Assistant — similar content</div>
          <div class="msg-body">Found ${data.sources.length} visually similar item${data.sources.length > 1 ? 's' : ''}:</div>
          ${renderSources(data.sources)}
        `;
        feed.appendChild(div);
        feed.scrollTop = feed.scrollHeight;
      }
    } catch {
      document.getElementById('typing')?.remove();
      addMsg('bot', 'Connection error. Is the server running?');
    }

    btn.disabled = false;
  }

  async function send() {
    const msg = inp.value.trim();
    if (!msg) return;

    inp.value = '';
    inp.style.height = 'auto';
    btn.disabled = true;

    addMsg('user', msg);
    addTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history }),
      });
      const data = await res.json();
      document.getElementById('typing')?.remove();

      if (data.error) {
        addMsg('bot', 'Error: ' + data.error);
      } else {
        addMsg('bot', data.response, data.sources);
        history.push({ role: 'user',      content: msg });
        history.push({ role: 'assistant', content: data.response });
      }
    } catch {
      document.getElementById('typing')?.remove();
      addMsg('bot', 'Connection error. Is the server running?');
    }

    btn.disabled = false;
    inp.focus();
  }
</script>
</body>
</html>
